<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PenCrafters</title>
    <script>
        function showPopup(topic) {
            alert('Selected topic: ' + topic);
        }
    </script>
</head>
<body>
    <form>
        <label for="topic">Topic:</label>
        <select id="topic" name="topic" required onchange="showPopup(this.value)">
            <option value="">Select an option</option>
            <option value="topic1">Topic 1</option>
            <option value="topic2">Topic 2</option>
            <option value="other" onclick="showPopup('Other option selected')">Other</option>
        </select><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="instagram">Instagram ID:</label>
        <input type="text" id="instagram" name="instagram" required><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
