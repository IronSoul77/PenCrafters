<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Helper - Books & Pen Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #8B4513;
            padding-bottom: 20px;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #8B4513;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .options-section {
            margin-bottom: 30px;
        }

        .options-title {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .options-title::before {
            content: "✏️";
            margin-right: 10px;
            font-size: 24px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            border-color: #8B4513;
            background: #fff8f5;
            transform: translateX(5px);
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #8B4513;
        }

        .checkbox-label {
            cursor: pointer;
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .checkbox-item input[type="checkbox"]:checked + .checkbox-label {
            color: #8B4513;
            font-weight: bold;
        }

        .input-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border-left: 4px solid #8B4513;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #8B4513;
            box-shadow: 0 0 5px rgba(139, 69, 19, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: #8B4513;
            color: white;
        }

        .btn-submit:hover {
            background: #6b3410;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #333;
        }

        .btn-reset:hover {
            background: #d0d0d0;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 4px;
            color: #333;
        }

        .result-item strong {
            color: #8B4513;
        }

        .book-icon {
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-icon">📚✏️</div>
            <h1>Hello There! Good to see you.</h1>
            <p class="subtitle">What can we help you with today?</p>
        </header>

        <form id="serviceForm">
            <div class="options-section">
                <div class="options-title">Select Your Service(s)</div>
                
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="homework" name="services" value="Homework/Assignment help">
                        <label for="homework" class="checkbox-label">📖 Homework/Assignment help</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="ppt" name="services" value="PPT Preparation">
                        <label for="ppt" class="checkbox-label">🎨 PPT Preparation</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="record" name="services" value="Record">
                        <label for="record" class="checkbox-label">🎥 Record</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="review" name="services" value="PPT review">
                        <label for="review" class="checkbox-label">✅ PPT review</label>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label for="concept">📝 Concept/Topic</label>
                    <input type="text" id="concept" name="concept" placeholder="Enter the concept or topic you need help with" required>
                </div>

                <div class="input-group">
                    <label for="description">📄 Description</label>
                    <textarea id="description" name="description" placeholder="Provide a detailed description of what you need..." required></textarea>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">✏️ Submit Request</button>
                <button type="reset" class="btn-reset">Clear Form</button>
            </div>
        </form>

        <div class="result" id="result">
            <h3>📚 Your Request Summary</h3>
            <div class="result-item">
                <strong>Selected Services:</strong> <span id="resultServices"></span>
            </div>
            <div class="result-item">
                <strong>Topic:</strong> <span id="resultConcept"></span>
            </div>
            <div class="result-item">
                <strong>Description:</strong> <span id="resultDescription"></span>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('serviceForm');
        const resultDiv = document.getElementById('result');
        const resultServices = document.getElementById('resultServices');
        const resultConcept = document.getElementById('resultConcept');
        const resultDescription = document.getElementById('resultDescription');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            // Get selected checkboxes
            const selectedServices = Array.from(
                document.querySelectorAll('input[name="services"]:checked')
            ).map(checkbox => checkbox.value);

            // Get form values
            const concept = document.getElementById('concept').value.trim();
            const description = document.getElementById('description').value.trim();

            // Validate at least one service is selected
            if (selectedServices.length === 0) {
                alert('Please select at least one service!');
                return;
            }

            // Validate other fields
            if (!concept || !description) {
                alert('Please fill in all fields!');
                return;
            }

            // Display results
            resultServices.textContent = selectedServices.join(', ');
            resultConcept.textContent = concept;
            resultDescription.textContent = description;
            resultDiv.classList.add('show');

            // Log to console
            console.log('=== Service Request ===');
            console.log('Selected Services:', selectedServices);
            console.log('Topic/Concept:', concept);
            console.log('Description:', description);
            console.log('========================');
        });

        // Clear result when user modifies form
        form.addEventListener('change', function() {
            resultDiv.classList.remove('show');
        });
    </script>
</body>
</html>
